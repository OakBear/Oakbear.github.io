<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态博客创作平台</title>
    <!-- 加载 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入 Inter 字体以获得现代感 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* 博客内容的基础样式，模拟 Markdown 渲染 */
        .prose p { margin-bottom: 1em; }
        .prose ul, .prose ol { margin-left: 1.5em; list-style-type: disc; }
        .prose h1, .prose h2, .prose h3 { font-weight: bold; margin-top: 1.5em; margin-bottom: 0.5em; }
        .whitespace-pre-wrap { white-space: pre-wrap; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="app" class="min-h-screen flex flex-col">
        <!-- 应用内容将在此处渲染 -->
    </div>

    <script type="module">
        // --- 引入 Firebase SDK (无需本地安装) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInWithPopup, GithubAuthProvider, signOut, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 全局状态管理与配置 ---
        const appElement = document.getElementById('app');
        let state = {
            user: null,
            posts: [],
            comments: {}, // 格式: { postId: [comment1, comment2, ...] }
            view: 'list', // 'list', 'create', 'view'
            selectedPostId: null,
            currentPostForm: { title: '', content: '' }
        };

        // 从运行环境中获取必要的全局变量
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'blog-platform-default-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app;
        let auth;
        let db;
        let postCollectionRef = null;

        // --- Firebase 初始化与认证 ---

        const initializeFirebase = async () => {
            if (!firebaseConfig) {
                renderError("Firestore 配置丢失。无法运行应用程序。");
                return;
            }
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            // 设定公共数据存储路径: /artifacts/{appId}/public/data/posts
            postCollectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'posts');

            // 处理初始认证令牌
            if (initialAuthToken) {
                try {
                    await signInWithCustomToken(auth, initialAuthToken);
                } catch (error) {
                    console.error("自定义令牌登录失败，尝试匿名登录:", error);
                    await signInAnonymously(auth);
                }
            } else {
                await signInAnonymously(auth);
            }
        };

        const signInWithGithub = async () => {
            const provider = new GithubAuthProvider();
            try {
                // 弹出 GitHub 登录窗口
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("GitHub 登录错误:", error);
                renderModal("GitHub 登录失败。请检查权限或网络连接。");
            }
        };

        const handleSignOut = async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("退出错误:", error);
                renderModal("退出失败。");
            }
        };

        // --- Firestore 实时监听器 ---

        const startPostListener = () => {
            if (!postCollectionRef) return;

            // 查询所有文章，按创建时间降序排列
            const q = query(postCollectionRef, orderBy('createdAt', 'desc'));
            onSnapshot(q, (snapshot) => {
                const fetchedPosts = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data(),
                    createdAt: doc.data().createdAt?.toDate() || new Date(0),
                }));
                state.posts = fetchedPosts;
                render(); // 数据变化时重新渲染列表
            }, (error) => {
                console.error("Firestore 文章快照错误:", error);
            });
        };

        const startCommentListener = (postId) => {
            if (!db || !postId) return;

            // 监听特定文章的评论子集合
            const commentsRef = collection(postCollectionRef, postId, 'comments');
            const q = query(commentsRef, orderBy('createdAt', 'asc'));

            onSnapshot(q, (snapshot) => {
                const fetchedComments = snapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data(),
                    createdAt: doc.data().createdAt?.toDate(),
                }));
                state.comments = { ...state.comments, [postId]: fetchedComments };
                render(); // 评论数据变化时重新渲染详情页
            }, (error) => {
                console.error(`Firestore 评论快照错误 for post ${postId}:`, error);
            });
        };

        // --- 数据操作函数 (CRUD) ---

        const handleCreatePost = async () => {
            if (!state.currentPostForm.title || !state.currentPostForm.content) {
                renderModal("标题和内容不能为空。");
                return;
            }
            if (state.user.isAnonymous) {
                renderModal("请先使用 GitHub 登录才能发布文章。");
                return;
            }

            try {
                // 将新文章数据写入 Firestore
                await addDoc(postCollectionRef, {
                    title: state.currentPostForm.title,
                    content: state.currentPostForm.content,
                    authorId: state.user.uid,
                    authorName: state.user.displayName || state.user.email || '作者',
                    authorPhoto: state.user.photoURL || null,
                    createdAt: serverTimestamp(),
                });
                
                // 清空表单并切换回列表视图
                state.currentPostForm = { title: '', content: '' };
                state.view = 'list';
                render();
            } catch (error) {
                console.error("创建文章错误:", error);
                renderModal("发布文章失败: " + error.message);
            }
        };

        const handleDeletePost = async (postId) => {
            // 使用自定义模态框替代 confirm()
            renderModal("确定要删除这篇文章吗？操作不可逆。", async () => {
                try {
                    const postRef = doc(postCollectionRef, postId);
                    await deleteDoc(postRef);
                    renderModal("文章删除成功！", () => {
                        // 切换回列表视图
                        state.view = 'list';
                        state.selectedPostId = null;
                        render();
                    });
                } catch (error) {
                    console.error("删除文章错误:", error);
                    renderModal("删除失败: " + error.message);
                }
            });
        };
        
        const handleAddComment = async (postId, text) => {
            if (!text.trim()) return;
            if (state.user.isAnonymous) {
                renderModal("请先使用 GitHub 登录才能评论。");
                return;
            }

            try {
                const commentsRef = collection(postCollectionRef, postId, 'comments');
                // 将评论数据写入 Firestore
                await addDoc(commentsRef, {
                    text: text,
                    authorId: state.user.uid,
                    authorName: state.user.displayName || state.user.email,
                    authorPhoto: state.user.photoURL || null,
                    createdAt: serverTimestamp(),
                });
                // 清空评论输入框
                document.getElementById('comment-input-' + postId).value = '';
            } catch (error) {
                console.error("添加评论错误:", error);
                renderModal("评论失败: " + error.message);
            }
        };

        // --- 渲染组件 ---

        const renderHeader = () => {
            const isAnonymous = state.user && state.user.isAnonymous;
            const isAuthenticated = state.user && !isAnonymous;
            const authorName = isAuthenticated ? (state.user.displayName || state.user.email || state.user.uid.substring(0, 8) + '...') : '访客';
            
            return `
                <header class="sticky top-0 z-10 bg-white border-b shadow-md">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex justify-between items-center">
                        <h1 class="text-2xl font-extrabold text-indigo-600 tracking-tight cursor-pointer" onclick="window.appActions.setView('list')">
                            在线博客创作
                        </h1>
                        <div class="flex items-center space-x-4">
                            <span class="text-sm font-medium text-gray-700 hidden sm:inline">
                                ${authorName}
                            </span>
                            ${isAuthenticated ? `
                                <button id="signOutBtn" class="px-4 py-2 bg-red-500 text-white text-sm font-medium rounded-lg shadow-md hover:bg-red-600 transition duration-150">
                                    退出
                                </button>
                            ` : `
                                <button id="signInBtn" class="px-4 py-2 bg-gray-800 text-white text-sm font-medium rounded-lg shadow-md hover:bg-gray-700 transition duration-150">
                                    GitHub 登录
                                </button>
                            `}
                        </div>
                    </div>
                </header>
            `;
        };

        const renderPostCard = (post) => {
            const dateStr = post.createdAt ? post.createdAt.toLocaleDateString() : '加载中...';
            // 显示部分内容作为预览
            const preview = post.content.substring(0, 200) + (post.content.length > 200 ? '...' : '');

            return `
                <div class="bg-white p-6 rounded-xl shadow-lg hover:shadow-2xl transition duration-300 transform hover:-translate-y-1 border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-2 hover:text-indigo-600 cursor-pointer"
                        onclick="window.appActions.setView('view', '${post.id}')"
                    >
                        ${post.title}
                    </h3>
                    <div class="flex items-center text-sm text-gray-500 mb-4">
                        <span class="mr-4">作者: ${post.authorName}</span>
                        <span>发布于: ${dateStr}</span>
                    </div>
                    <p class="text-gray-600 mb-4 whitespace-pre-wrap">${preview}</p>
                    <button
                        onclick="window.appActions.setView('view', '${post.id}')"
                        class="text-indigo-600 hover:text-indigo-800 font-medium transition duration-150"
                    >
                        阅读全文 &rarr;
                    </button>
                </div>
            `;
        };

        const renderPostForm = () => {
            if (state.user.isAnonymous) {
                return `
                    <div class="p-8 text-center bg-yellow-100 text-yellow-700 rounded-lg shadow-xl max-w-4xl mx-auto">
                        <p class="text-xl font-semibold mb-2">只有登录用户才能创建文章。</p>
                        <p>请点击右上角的 **GitHub 登录** 按钮开始写作。</p>
                    </div>
                `;
            }

            const { title, content } = state.currentPostForm;
            const isDisabled = !title || !content;

            return `
                <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-2xl border border-indigo-100">
                    <h2 class="text-3xl font-bold text-indigo-600 mb-6">在线创作新文章</h2>
                    <div class="space-y-6">
                        <input
                            type="text"
                            placeholder="文章标题"
                            value="${title}"
                            oninput="window.appActions.updateForm('title', this.value)"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-lg shadow-sm"
                        />
                        <textarea
                            placeholder="文章内容 (直接在浏览器中写作，内容实时保存到云端)"
                            rows="15"
                            oninput="window.appActions.updateForm('content', this.value)"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 text-base resize-none shadow-sm"
                        >${content}</textarea>
                    </div>
                    <div class="flex justify-end space-x-4 mt-8">
                        <button
                            onclick="window.appActions.setView('list')"
                            class="px-6 py-3 border border-gray-300 text-gray-700 font-semibold rounded-lg hover:bg-gray-100 transition duration-150"
                        >
                            取消
                        </button>
                        <button
                            onclick="window.appActions.handleCreatePost()"
                            class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition duration-150 ${isDisabled ? 'opacity-50 cursor-not-allowed' : ''}"
                            ${isDisabled ? 'disabled' : ''}
                        >
                            发布文章
                        </button>
                    </div>
                </div>
            `;
        };

        const renderCommentCard = (comment) => {
            const dateStr = comment.createdAt ? comment.createdAt.toLocaleString() : 'N/A';
            const isAuthor = comment.authorId === state.user?.uid;
            
            const initials = (comment.authorName || 'U').charAt(0);
            const photoUrl = comment.authorPhoto || `https://placehold.co/32x32/10b981/ffffff?text=${initials}`;

            return `
                <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex items-center">
                            <img 
                                src="${photoUrl}"
                                alt="${comment.authorName}"
                                class="w-8 h-8 rounded-full mr-3 object-cover"
                                onerror="this.onerror=null;this.src='https://placehold.co/32x32/10b981/ffffff?text=U'"
                            />
                            <span class="font-semibold text-gray-800">${comment.authorName}</span>
                            ${isAuthor ? '<span class="ml-2 text-xs font-medium text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded-full">你</span>' : ''}
                        </div>
                        <span class="text-xs text-gray-500">${dateStr}</span>
                    </div>
                    <p class="text-gray-700 ml-11 whitespace-pre-wrap">${comment.text}</p>
                </div>
            `;
        };

        const renderCommentSection = (post) => {
            const comments = state.comments[post.id] || [];
            const isAuthenticated = state.user && !state.user.isAnonymous;
            const commentInputId = 'comment-input-' + post.id;

            return `
                <div class="bg-white p-8 rounded-xl shadow-2xl border border-gray-100">
                    <h3 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-3">
                        实时评论 (${comments.length})
                    </h3>
                    
                    <!-- 评论输入区 -->
                    <div class="mb-8">
                        <textarea
                            id="${commentInputId}"
                            placeholder="${isAuthenticated ? "留下你的评论..." : "请使用 GitHub 登录后才能评论..."}"
                            rows="4"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 resize-none shadow-sm"
                            ${!isAuthenticated ? 'disabled' : ''}
                        ></textarea>
                        <div class="flex justify-end mt-3">
                            <button
                                onclick="window.appActions.handleAddComment('${post.id}', document.getElementById('${commentInputId}').value)"
                                class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 transition duration-150 ${!isAuthenticated ? 'opacity-50 cursor-not-allowed' : ''}"
                                ${!isAuthenticated ? 'disabled' : ''}
                            >
                                提交评论
                            </button>
                        </div>
                    </div>

                    <!-- 评论列表 -->
                    <div class="space-y-6">
                        ${comments.length === 0 ? `
                            <p class="text-gray-500 text-center py-4">还没有评论。快来抢沙发吧！</p>
                        ` : comments.map(renderCommentCard).join('')}
                    </div>
                </div>
            `;
        };

        const renderPostDetail = () => {
            const post = state.posts.find(p => p.id === state.selectedPostId);
            if (!post) return `<div class="text-center p-8 text-gray-500">文章未找到。</div>`;

            const isPostAuthor = state.user && state.user.uid === post.authorId;
            const initials = (post.authorName || 'A').charAt(0);
            const photoUrl = post.authorPhoto || `https://placehold.co/40x40/4f46e5/ffffff?text=${initials}`;

            // 激活评论实时监听
            startCommentListener(post.id);

            return `
                <div class="max-w-4xl mx-auto">
                    <!-- 文章内容区 -->
                    <article class="bg-white p-8 rounded-xl shadow-2xl border border-indigo-100 mb-8">
                        <button
                            onclick="window.appActions.setView('list')"
                            class="mb-4 text-indigo-600 hover:text-indigo-800 font-medium flex items-center transition duration-150"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left mr-2"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                            返回文章列表
                        </button>
                        <h1 class="text-4xl font-extrabold text-gray-900 mb-4">${post.title}</h1>
                        <div class="text-gray-500 flex items-center mb-8 border-b pb-4">
                            <img 
                                src="${photoUrl}"
                                alt="${post.authorName}"
                                class="w-10 h-10 rounded-full mr-3 object-cover"
                                onerror="this.onerror=null;this.src='https://placehold.co/40x40/4f46e5/ffffff?text=A'"
                            />
                            <span>
                                由 <span class="font-semibold text-gray-700">${post.authorName}</span> 发布于
                                ${post.createdAt ? post.createdAt.toLocaleDateString() : 'N/A'}
                            </span>
                        </div>
                        <div class="prose max-w-none text-gray-700 leading-relaxed whitespace-pre-wrap">
                            ${post.content}
                        </div>
                        ${isPostAuthor ? `
                            <div class="mt-6 pt-4 border-t flex justify-end">
                                <button onclick="window.appActions.handleDeletePost('${post.id}')" class="px-4 py-2 bg-red-500 text-white text-sm font-medium rounded-lg shadow-md hover:bg-red-600 transition duration-150">
                                    删除文章
                                </button>
                            </div>
                        ` : ''}
                    </article>

                    <!-- 评论区 -->
                    ${renderCommentSection(post)}
                </div>
            `;
        };

        const renderPostList = () => {
            const isAuthor = state.user && !state.user.isAnonymous;

            return `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-bold text-gray-800">所有文章</h2>
                    ${isAuthor ? `
                        <button
                            onclick="window.appActions.setView('create')"
                            class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg shadow-lg hover:bg-indigo-700 transition duration-150"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-edit-3 inline-block mr-2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/><path d="M19 16.5 15.5 13"/></svg>
                            开始写作
                        </button>
                    ` : ''}
                </div>
                <div class="space-y-6">
                    ${state.posts.length === 0
                        ? `<div class="p-8 text-center bg-white rounded-xl shadow-inner"><p class="text-gray-500">目前没有文章。${isAuthor ? "快来发布你的第一篇文章吧！" : "请先登录才能开始写作。"}</p></div>`
                        : state.posts.map(renderPostCard).join('')
                    }
                </div>
            `;
        };
        
        const renderMainContent = () => {
            if (!state.user) return `<div class="text-center p-10">连接中...</div>`;

            let contentHTML = '';
            switch (state.view) {
                case 'list':
                    contentHTML = renderPostList();
                    break;
                case 'create':
                    contentHTML = renderPostForm();
                    break;
                case 'view':
                    contentHTML = renderPostDetail();
                    break;
                default:
                    contentHTML = renderPostList();
            }

            return `
                <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                    ${contentHTML}
                </main>
            `;
        };

        const renderError = (message) => {
            appElement.innerHTML = `
                ${renderHeader()}
                <div class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
                    <div class="p-8 text-center bg-red-100 text-red-700 rounded-xl shadow-xl border border-red-300">
                        <h3 class="text-xl font-bold mb-4">应用错误</h3>
                        <p>${message}</p>
                    </div>
                </div>
            `;
        };

        const renderModal = (message, onConfirm = null) => {
            const modalHTML = `
                <div id="customModal" class="fixed inset-0 bg-gray-900 bg-opacity-75 z-50 flex items-center justify-center p-4">
                    <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full transform transition-all duration-300">
                        <p class="text-gray-800 text-lg mb-6">${message}</p>
                        <div class="flex justify-end space-x-3">
                            ${onConfirm ? `
                                <button onclick="document.getElementById('customModal').remove()" class="px-4 py-2 text-gray-600 rounded-lg hover:bg-gray-100">取消</button>
                                <button id="confirmActionBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">确定</button>
                            ` : `
                                <button onclick="document.getElementById('customModal').remove()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">关闭</button>
                            `}
                        </div>
                    </div>
                </div>
            `;
            // 将模态框添加到 body
            const existingModal = document.getElementById('customModal');
            if (existingModal) existingModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHTML);

            if (onConfirm) {
                document.getElementById('confirmActionBtn').onclick = () => {
                    onConfirm();
                    document.getElementById('customModal').remove();
                };
            }
        };

        // --- 全局动作 (供 HTML 内联事件调用) ---
        window.appActions = {
            setView: (newView, postId = null) => {
                state.view = newView;
                state.selectedPostId = postId;
                render();
            },
            updateForm: (field, value) => {
                state.currentPostForm[field] = value;
                // 优化表单更新，只替换表单容器以更新按钮状态
                if (state.view === 'create') {
                    const formContainer = appElement.querySelector('.max-w-4xl');
                    if (formContainer) {
                         const tempDiv = document.createElement('div');
                         tempDiv.innerHTML = renderPostForm();
                         formContainer.replaceWith(tempDiv.firstChild);

                         // 重新绑定输入事件（因为 DOM 元素被替换了）
                         document.querySelector('input[placeholder="文章标题"]').oninput = (e) => window.appActions.updateForm('title', e.target.value);
                         document.querySelector('textarea[placeholder*="文章内容"]').oninput = (e) => window.appActions.updateForm('content', e.target.value);
                    }
                }
            },
            handleCreatePost,
            handleDeletePost,
            handleAddComment,
        };

        // --- 主渲染循环与初始化 ---
        const render = () => {
            appElement.innerHTML = renderHeader() + renderMainContent();

            // 绑定退出和登录按钮事件
            const signInBtn = document.getElementById('signInBtn');
            if (signInBtn) signInBtn.onclick = signInWithGithub;

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.onclick = handleSignOut;
        };

        window.onload = async () => {
            // 1. 初始化 Firebase
            await initializeFirebase();

            // 2. 监听用户认证状态变化
            onAuthStateChanged(auth, (user) => {
                // 设置用户状态 (未登录时使用匿名用户ID)
                state.user = user || { isAnonymous: true, uid: `guest-${Math.random().toString(36).substring(2, 9)}` };
                
                // 3. 登录状态确定后，开始监听文章列表
                startPostListener(); 
                
                // 4. 渲染界面
                render();
            });
        };
    </script>
</body>
</html>
